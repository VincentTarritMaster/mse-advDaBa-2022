apiVersion: batch/v1
kind: Job
metadata:
  name: importer
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: importer
    spec:
      restartPolicy: Never
      containers:
        - name: importer
          image: vincenttarrit/neo4jtp:latest
          imagePullPolicy: Always
          env:
            - name: JSON_FILE
              value: "http://vmrum.isc.heia-fr.ch/files/DBLP-Citation-network-V18.jsonl"
            #- name: MAX_NODES
            #  value: "10000"
            - name: BATCH_SIZE
              value: "5000"
            - name: NEO4J_IP
              value: "db"
          resources:
            limits:
              memory: "4Gi"
